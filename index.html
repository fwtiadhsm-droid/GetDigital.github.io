<!DOCTYPE html>
<html>
<head>

<style>

body{

color:white;

}

header{

font-size:28px;
}

.products{
display:flex;
justify-content:center;

margin-top:40px;
flex-wrap:wrap;
}

.product{
background:#1e293b;
padding:20px;
border-radius:10px;
width:200px;
}

button{
background:#22c55e;
border:none;
padding:10px;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<header>
GetDigital Shop
</header>

<h2>Products</h2>

<div class="products">

<div class="product">
<h3>Premium Account</h3>
<p>Instant delivery</p>
<p>$5</p>
<button>Buy</button>
</div>

<div class="product">
<h3>Gaming Account</h3>
<p>Full access</p>
<p>$10</p>
<button>Buy</button>
</div>

<div class="product">
<h3>Digital Tool</h3>
<p>Lifetime</p>
<p>$15</p>
<button>Buy</button>
</div>

</div>

</body>
</html>
